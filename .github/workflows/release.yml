name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate-versions:
    runs-on: ubuntu-22.04
    outputs:
      release-notes: ${{ steps.changelog.outputs.notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check version consistency
        run: |
          TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)
          PKG=$(jq -r '.version' package.json)
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          echo "tauri.conf.json : $TAURI"
          echo "package.json    : $PKG"
          echo "Cargo.toml      : $CARGO"

          if [ "$TAURI" != "$PKG" ] || [ "$TAURI" != "$CARGO" ]; then
            echo ""
            echo "Version mismatch — all three files must declare the same version before releasing."
            exit 1
          fi

          echo ""
          echo "All versions match: $TAURI"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for version $VERSION in CHANGELOG.md."
            exit 1
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate-versions
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm vitest run

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: GPG Local v__VERSION__
          releaseBody: ${{ needs.validate-versions.outputs.release-notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
